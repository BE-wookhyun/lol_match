services:
  backend:
    image: wookhyunkim/lol_match_backend:${BACKEND_TAG:-latest}
    container_name: lol_match_backend
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      RIOT_API_KEY: ${RIOT_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    volumes:
      - ./logs/backend:/app/logs

  frontend:
    image: wookhyunkim/lol_match_frontend:${FRONTEND_TAG:-latest}
    container_name: lol_match_frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: lol_match_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
