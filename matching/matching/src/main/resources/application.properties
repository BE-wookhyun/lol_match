spring.application.name=matching

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

riot.api-key=${RIOT_API_KEY}
riot.regional-host=https://asia.api.riotgames.com
riot.platform-host=https://kr.api.riotgames.com
riot.season=2025

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://3.34.150.232:5173,https://leole-match.site,https://www.leole-match.site
app.admin-api-key=${ADMIN_API_KEY:}

# Caddy가 X-Forwarded-For/Proto를 붙여주므로, 내장 톰캣이 이를 신뢰해 실제 클라이언트 IP를 복원하도록 설정
server.forward-headers-strategy=native
